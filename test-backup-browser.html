<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Navegação - Backup</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        #results { margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🧪 Teste de Navegação - Sistema de Backup</h1>
    
    <div class="test-section">
        <h2>Simulação de Dados</h2>
        <button onclick="setupTestData()">1. Configurar Dados de Teste</button>
        <button onclick="clearAllData()">2. Limpar Dados</button>
        <div id="setup-results"></div>
    </div>
    
    <div class="test-section">
        <h2>Testes de Backup</h2>
        <button onclick="testBackupCreation()">3. Testar Criação de Backup</button>
        <button onclick="testBackupExport()">4. Testar Exportação</button>
        <button onclick="testBackupImport()">5. Testar Importação</button>
        <button onclick="testAutoBackup()">6. Testar Backup Automático</button>
        <div id="backup-results"></div>
    </div>
    
    <div class="test-section">
        <h2>Teste de Navegação</h2>
        <button onclick="simulateNavigation()">7. Simular Navegação para Backup</button>
        <div id="navigation-results"></div>
    </div>
    
    <div id="results">
        <h3>Resultados dos Testes:</h3>
        <div id="test-log"></div>
    </div>

    <script>
        let testResults = [];
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}`;
            testResults.push({ message: logEntry, type });
            
            const logDiv = document.getElementById('test-log');
            const entry = document.createElement('div');
            entry.className = type;
            entry.textContent = logEntry;
            logDiv.appendChild(entry);
            
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function setupTestData() {
            try {
                log('Configurando dados de teste...', 'info');
                
                // Simulate user authentication
                const mockUser = {
                    id: 1,
                    nome: 'Test User',
                    email: 'test@example.com',
                    tipo: 'usuario'
                };
                
                localStorage.setItem('token', 'mock-jwt-token-' + Date.now());
                localStorage.setItem('user', JSON.stringify(mockUser));
                
                // Simulate financial data
                const mockReceitas = [
                    { id: 1, descricao: 'Salário', valor: 5000, categoria: 'Trabalho', data: '2024-01-01' },
                    { id: 2, descricao: 'Freelance', valor: 1500, categoria: 'Trabalho', data: '2024-01-15' }
                ];
                
                const mockDespesas = [
                    { id: 1, descricao: 'Aluguel', valor: 1500, categoria: 'Moradia', data: '2024-01-01' },
                    { id: 2, descricao: 'Supermercado', valor: 800, categoria: 'Alimentação', data: '2024-01-10' }
                ];
                
                localStorage.setItem('RECEITAS', JSON.stringify(mockReceitas));
                localStorage.setItem('DESPESAS', JSON.stringify(mockDespesas));
                localStorage.setItem('ORCAMENTO_2024-01', JSON.stringify({ total: 5000, gasto: 2300 }));
                
                log('✅ Dados de teste configurados com sucesso', 'success');
                log(`- Usuário: ${mockUser.nome} (${mockUser.email})`, 'info');
                log(`- Receitas: ${mockReceitas.length} registros`, 'info');
                log(`- Despesas: ${mockDespesas.length} registros`, 'info');
                
                document.getElementById('setup-results').innerHTML = '<span class="success">✅ Dados configurados!</span>';
                
            } catch (error) {
                log(`❌ Erro ao configurar dados: ${error.message}`, 'error');
                document.getElementById('setup-results').innerHTML = '<span class="error">❌ Erro na configuração</span>';
            }
        }
        
        function clearAllData() {
            try {
                log('Limpando todos os dados...', 'info');
                
                const keysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && (key.startsWith('RECEITAS') || key.startsWith('DESPESAS') || key.startsWith('ORCAMENTO_'))) {
                        keysToRemove.push(key);
                    }
                }
                
                keysToRemove.forEach(key => {
                    localStorage.removeItem(key);
                    log(`Removido: ${key}`, 'info');
                });
                
                log(`✅ ${keysToRemove.length} chaves removidas`, 'success');
                document.getElementById('setup-results').innerHTML = '<span class="success">✅ Dados limpos!</span>';
                
            } catch (error) {
                log(`❌ Erro ao limpar dados: ${error.message}`, 'error');
                document.getElementById('setup-results').innerHTML = '<span class="error">❌ Erro ao limpar</span>';
            }
        }
        
        function testBackupCreation() {
            try {
                log('Testando criação de backup...', 'info');
                
                const getAllData = () => {
                    const receitas = localStorage.getItem('RECEITAS');
                    const despesas = localStorage.getItem('DESPESAS');
                    
                    const orcamentos = {};
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        if (key && key.startsWith('ORCAMENTO_')) {
                            orcamentos[key] = localStorage.getItem(key);
                        }
                    }
                    
                    return {
                        RECEITAS: receitas ? JSON.parse(receitas) : [],
                        DESPESAS: despesas ? JSON.parse(despesas) : [],
                        ORCAMENTOS: orcamentos,
                        timestamp: new Date().toISOString(),
                    };
                };
                
                const backupData = getAllData();
                log('✅ Backup criado com sucesso', 'success');
                log(`- Timestamp: ${backupData.timestamp}`, 'info');
                log(`- Receitas: ${backupData.RECEITAS.length} itens`, 'info');
                log(`- Despesas: ${backupData.DESPESAS.length} itens`, 'info');
                log(`- Orçamentos: ${Object.keys(backupData.ORCAMENTOS).length} chaves`, 'info');
                
                // Save to auto backup
                localStorage.setItem('BACKUP_AUTO', JSON.stringify(backupData));
                log('✅ Backup automático salvo', 'success');
                
                document.getElementById('backup-results').innerHTML = '<span class="success">✅ Backup criado!</span>';
                
            } catch (error) {
                log(`❌ Erro ao criar backup: ${error.message}`, 'error');
                document.getElementById('backup-results').innerHTML = '<span class="error">❌ Erro ao criar</span>';
            }
        }
        
        function testBackupExport() {
            try {
                log('Testando exportação de backup...', 'info');
                
                const backupData = localStorage.getItem('BACKUP_AUTO');
                if (!backupData) {
                    log('⚠️ Nenhum backup encontrado para exportar', 'error');
                    document.getElementById('backup-results').innerHTML = '<span class="error">⚠️ Sem backup</span>';
                    return;
                }
                
                const data = JSON.parse(backupData);
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                // Simulate download
                const a = document.createElement('a');
                a.href = url;
                a.download = `financas-backup-${new Date().toISOString().replace(/[:.]/g, '-')}.json`;
                
                log('✅ Backup preparado para download', 'success');
                log(`- Tamanho: ${(blob.size / 1024).toFixed(2)} KB`, 'info');
                log(`- Nome: ${a.download}`, 'info');
                
                // Clean up
                URL.revokeObjectURL(url);
                
                document.getElementById('backup-results').innerHTML = '<span class="success">✅ Exportação simulada!</span>';
                
            } catch (error) {
                log(`❌ Erro ao exportar: ${error.message}`, 'error');
                document.getElementById('backup-results').innerHTML = '<span class="error">❌ Erro ao exportar</span>';
            }
        }
        
        function testBackupImport() {
            try {
                log('Testando importação de backup...', 'info');
                
                const backupData = localStorage.getItem('BACKUP_AUTO');
                if (!backupData) {
                    log('⚠️ Nenhum backup encontrado para importar', 'error');
                    document.getElementById('backup-results').innerHTML = '<span class="error">⚠️ Sem backup</span>';
                    return;
                }
                
                const data = JSON.parse(backupData);
                
                // Validate backup format
                if (!data.RECEITAS || !data.DESPESAS || !data.ORCAMENTOS) {
                    throw new Error('Formato de backup inválido');
                }
                
                // Simulate restore
                const restoreAllData = (data) => {
                    localStorage.setItem('RECEITAS', JSON.stringify(data.RECEITAS || []));
                    localStorage.setItem('DESPESAS', JSON.stringify(data.DESPESAS || []));
                    
                    // Clear existing budgets
                    const keysToRemove = [];
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        if (key && key.startsWith('ORCAMENTO_')) {
                            keysToRemove.push(key);
                        }
                    }
                    keysToRemove.forEach(key => localStorage.removeItem(key));
                    
                    // Restore budgets
                    if (data.ORCAMENTOS && typeof data.ORCAMENTOS === 'object') {
                        Object.entries(data.ORCAMENTOS).forEach(([key, value]) => {
                            localStorage.setItem(key, value);
                        });
                    }
                };
                
                restoreAllData(data);
                log('✅ Backup importado com sucesso', 'success');
                log('✅ Dados restaurados', 'success');
                
                document.getElementById('backup-results').innerHTML = '<span class="success">✅ Importação simulada!</span>';
                
            } catch (error) {
                log(`❌ Erro ao importar: ${error.message}`, 'error');
                document.getElementById('backup-results').innerHTML = '<span class="error">❌ Erro ao importar</span>';
            }
        }
        
        function testAutoBackup() {
            try {
                log('Testando backup automático...', 'info');
                
                const performAutoBackup = () => {
                    const getAllData = () => {
                        const receitas = localStorage.getItem('RECEITAS');
                        const despesas = localStorage.getItem('DESPESAS');
                        
                        const orcamentos = {};
                        for (let i = 0; i < localStorage.length; i++) {
                            const key = localStorage.key(i);
                            if (key && key.startsWith('ORCAMENTO_')) {
                                orcamentos[key] = localStorage.getItem(key);
                            }
                        }
                        
                        return {
                            RECEITAS: receitas ? JSON.parse(receitas) : [],
                            DESPESAS: despesas ? JSON.parse(despesas) : [],
                            ORCAMENTOS: orcamentos,
                            timestamp: new Date().toISOString(),
                        };
                    };
                    
                    const snapshot = getAllData();
                    localStorage.setItem('BACKUP_AUTO', JSON.stringify(snapshot));
                    return snapshot;
                };
                
                const snapshot = performAutoBackup();
                log('✅ Backup automático realizado', 'success');
                log(`- Timestamp: ${snapshot.timestamp}`, 'info');
                
                document.getElementById('backup-results').innerHTML = '<span class="success">✅ Auto-backup testado!</span>';
                
            } catch (error) {
                log(`❌ Erro no backup automático: ${error.message}`, 'error');
                document.getElementById('backup-results').innerHTML = '<span class="error">❌ Erro no auto-backup</span>';
            }
        }
        
        function simulateNavigation() {
            try {
                log('Simulando navegação completa...', 'info');
                
                // Step 1: Check authentication
                const token = localStorage.getItem('token');
                const user = localStorage.getItem('user');
                
                if (!token || !user) {
                    log('⚠️ Usuário não autenticado', 'error');
                    log('Simulando login...', 'info');
                    setupTestData();
                } else {
                    log('✅ Usuário autenticado', 'success');
                    log(`- Token presente: ${token.substring(0, 20)}...`, 'info');
                    log(`- User: ${JSON.parse(user).nome}`, 'info');
                }
                
                // Step 2: Simulate navigation to backup
                log('Navegando para backup...', 'info');
                
                // Step 3: Simulate component mounting
                log('Componente Backup montando...', 'info');
                
                // Step 4: Simulate useEffect execution
                log('Executando useEffect...', 'info');
                
                // Step 5: Simulate auto-backup
                testAutoBackup();
                
                // Step 6: Check for any errors that would cause logoff
                const backupKey = 'BACKUP_AUTO';
                const backupExists = localStorage.getItem(backupKey);
                
                if (backupExists) {
                    log('✅ Backup automático encontrado', 'success');
                    log('✅ Nenhum erro que causaria logoff', 'success');
                    log('✅ Navegação concluída com sucesso', 'success');
                    
                    document.getElementById('navigation-results').innerHTML = '<span class="success">✅ Navegação bem-sucedida!</span>';
                } else {
                    log('⚠️ Backup automático não encontrado', 'error');
                    document.getElementById('navigation-results').innerHTML = '<span class="error">⚠️ Falha na navegação</span>';
                }
                
            } catch (error) {
                log(`❌ Erro durante navegação: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
                document.getElementById('navigation-results').innerHTML = '<span class="error">❌ Erro na navegação</span>';
            }
        }
        
        // Initialize test on page load
        window.addEventListener('load', () => {
            log('Sistema de teste carregado', 'info');
            log('Pronto para executar testes de backup', 'info');
        });
    </script>
</body>
</html>
