<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Login - Diogo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button { margin: 10px 0; padding: 10px 20px; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Teste de Login - Diogo</h1>
    <p><strong>Email:</strong> diogo.grunge@gmail.com</p>
    <p><strong>Senha:</strong> diogo123</p>
    
    <button onclick="testarLogin()">Testar Login</button>
    <button onclick="testarDashboard()">Testar Dashboard</button>
    <button onclick="limparResultado()">Limpar</button>
    
    <div id="result"></div>

    <script>
        function mostrarResultado(mensagem, tipo = 'info') {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<div class="${tipo}">${new Date().toLocaleTimeString()} - ${mensagem}</div>`;
        }

        function adicionarResultado(mensagem, tipo = 'info') {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML += `<div class="${tipo}">${mensagem}</div>`;
        }

        async function testarLogin() {
            mostrarResultado('Iniciando teste de login...', 'info');
            
            try {
                const response = await fetch('http://localhost:3001/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'diogo.grunge@gmail.com',
                        senha: 'diogo123'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    adicionarResultado('✅ Login bem-sucedido!', 'success');
                    adicionarResultado(`Token: ${data.token.substring(0, 50)}...`, 'info');
                    
                    // Salvar token no localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    
                    adicionarResultado('✅ Dados salvos no localStorage', 'success');
                } else {
                    adicionarResultado(`❌ Erro no login: ${data.message}`, 'error');
                }
            } catch (error) {
                adicionarResultado(`❌ Erro na requisição: ${error.message}`, 'error');
            }
        }

        async function testarDashboard() {
            const token = localStorage.getItem('token');
            
            if (!token) {
                mostrarResultado('❌ Nenhum token encontrado. Faça login primeiro.', 'error');
                return;
            }

            mostrarResultado('Testando acesso ao dashboard...', 'info');
            
            try {
                const response = await fetch('http://localhost:3001/api/user/dados', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    adicionarResultado('✅ Dashboard acessado com sucesso!', 'success');
                    adicionarResultado(`Receitas: ${data.dados.receitas?.length || 0}`, 'info');
                    adicionarResultado(`Despesas: ${data.dados.despesas?.length || 0}`, 'info');
                    
                    if (data.dados.receitas?.length > 0) {
                        const totalReceitas = data.dados.receitas.reduce((sum, rec) => sum + rec.valor, 0);
                        adicionarResultado(`Total Receitas: R$ ${totalReceitas.toFixed(2)}`, 'info');
                    }
                    
                    if (data.dados.despesas?.length > 0) {
                        const totalDespesas = data.dados.despesas.reduce((sum, desp) => sum + desp.valor, 0);
                        adicionarResultado(`Total Despesas: R$ ${totalDespesas.toFixed(2)}`, 'info');
                    }
                } else {
                    adicionarResultado(`❌ Erro ao acessar dashboard: ${data.message}`, 'error');
                }
            } catch (error) {
                adicionarResultado(`❌ Erro na requisição: ${error.message}`, 'error');
            }
        }

        function limparResultado() {
            document.getElementById('result').innerHTML = '';
        }

        // Verificar se já existe token ao carregar a página
        window.onload = function() {
            const token = localStorage.getItem('token');
            const usuario = localStorage.getItem('usuario');
            
            if (token && usuario) {
                mostrarResultado('✅ Usuário já autenticado no navegador', 'success');
                const userData = JSON.parse(usuario);
                adicionarResultado(`Email: ${userData.email}`, 'info');
                adicionarResultado(`Nome: ${userData.nome}`, 'info');
            } else {
                mostrarResultado('ℹ️ Nenhum usuário autenticado. Use o botão "Testar Login".', 'info');
            }
        };
    </script>
</body>
</html>
